name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # -------------------------------------------------------------------------
  # Code formatting – ruff format
  # -------------------------------------------------------------------------
  format:
    name: Code Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --group dev
      - name: Check code formatting
        run: uv run ruff format --check .

  # -------------------------------------------------------------------------
  # Linting – ruff (style + docstrings via pydocstyle rules)
  # -------------------------------------------------------------------------
  lint:
    name: Linting (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --group dev
      - name: Lint with ruff
        run: uv run ruff check .

  # -------------------------------------------------------------------------
  # Pylint – require a minimum score of 8.5
  # -------------------------------------------------------------------------
  pylint:
    name: Pylint (min score 8.5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run pylint
        run: uv run pylint homebox/ --fail-under=8.5

  # -------------------------------------------------------------------------
  # Type checking – ty
  # -------------------------------------------------------------------------
  type-check:
    name: Type Check (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run ty type checker
        run: uv run ty check homebox/

  # -------------------------------------------------------------------------
  # Spell checking – codespell
  # -------------------------------------------------------------------------
  spell-check:
    name: Spell Check (codespell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run codespell
        run: uv run codespell .

  # -------------------------------------------------------------------------
  # Tests – matrix across Python 3.12, 3.13, 3.14 with coverage upload
  # -------------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run tests with coverage
        run: uv run pytest --cov=homebox --cov-report=lcov:coverage.lcov -m "not real"
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.lcov
          flag-name: python-${{ matrix.python-version }}
          parallel: true

  # Notify Coveralls that all parallel uploads are done
  coveralls-finish:
    name: Coveralls Finish
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
