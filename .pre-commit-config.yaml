repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-lint
        name: ruff check
        entry: uv run ruff check
        language: system
        types: [python]
        pass_filenames: false

      - id: pylint-homebox
        name: pylint (homebox, min score 8.5)
        entry: uv run pylint homebox/ --fail-under=8.5
        language: system
        pass_filenames: false

      - id: ty-check
        name: ty check
        entry: uv run ty check homebox/
        language: system
        pass_filenames: false

      - id: codespell
        name: codespell
        entry: uv run codespell .
        language: system
        pass_filenames: false
